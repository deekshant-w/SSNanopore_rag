services:
  pinecone:
    image: ghcr.io/pinecone-io/pinecone-local:latest
    profiles: [pinecone]
    environment: 
      PORT: 5080
      PINECONE_HOST: localhost
    ports: 
      - "5080-5090:5080-5090"
    platform: linux/amd64

  qdrant:
    image: qdrant/qdrant:latest
    profiles: [qdrant]
    ports:
      - "6333:6333"   # REST API